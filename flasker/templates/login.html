<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管理者ログイン</title>
<link rel="stylesheet" href="/static/css/style.css">

<style>
.login-box {
    max-width: 400px;
    margin: 80px auto;
    padding: 20px;
    background: rgba(255,255,255,0.9);
    border-radius: 10px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    margin-top: 15px;
    padding: 10px 20px;
}
.error {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>管理者ログイン</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="password" name="password" placeholder="パスワード">
        <button type="submit">ログイン</button>
    </form>
</div>

</body>
</html>
