<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戌亥ここ好き</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>
.kokosuki-container {
    max-width: 700px;
    margin: 40px auto;
    padding: 20px;
    background: rgba(255,255,255,0.85);
    border-radius: 10px;
}

.back-btn {
    display: inline-block;
    padding: 8px 14px;
    background: #444;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    margin-bottom: 20px;
}

.back-btn:hover {
    background: #222;
}

.page-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
}

.input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.input-row input {
    flex: 1;
    padding: 8px;
    font-size: 14px;
}

button {
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
}

.item {
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 6px;
    margin-top: 12px;
    display: flex;
    gap: 12px;
}

.thumb {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 4px;
}

.info {
    flex: 1;
}

.delete-btn {
    background: #e33;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    height: 30px;
}
</style>
</head>

<body>

<div class="line-w1"></div>
<div class="line-red"></div>
<div class="line-w3"></div>
<div class="line-w4"></div>
<div class="line-yellow"></div>
<div class="line-w6"></div>

<div class="kokosuki-container">

    <a href="{{ url_for('main.index') }}" class="back-btn">← 戻る</a>

    <div class="page-title">戌亥ここ好き</div>

    <h2>YouTube URL とコメントを追加</h2>

    <div class="input-row">
        <input id="youtubeUrl" type="text" placeholder="YouTube の URL を入力">
    </div>

    <div class="input-row">
        <input id="minuteInput" type="number" min="0" placeholder="分">
        <input id="secondInput" type="number" min="0" max="59" placeholder="秒">
    </div>

    <div class="input-row">
        <input id="comment" type="text" placeholder="コメントを入力">
        <button onclick="addItem()">追加</button>
    </div>

    <h3>追加された一覧</h3>
    <div id="list"></div>

</div>

<script>
// Flask から渡された admin 情報
const IS_ADMIN = {{ 'true' if admin else 'false' }};

// YouTube ID 抽出
function extractVideoId(url) {
    const match = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return match ? match[1] : null;
}

// タイトル取得（noembed）
async function fetchTitle(url) {
    try {
        const res = await fetch(`https://noembed.com/embed?url=${url}`);
        const data = await res.json();
        return data.title || "タイトル取得失敗";
    } catch {
        return "タイトル取得失敗";
    }
}

// ローカルストレージ読み込み
function loadItems() {
    const saved = JSON.parse(localStorage.getItem("youtubeItems") || "[]");
    saved.forEach(item => renderItem(item));
}

// 追加処理（時間指定対応）
async function addItem() {
    const urlBase = document.getElementById("youtubeUrl").value.trim();
    const comment = document.getElementById("comment").value.trim();
    const minute = parseInt(document.getElementById("minuteInput").value || 0);
    const second = parseInt(document.getElementById("secondInput").value || 0);

    if (!urlBase) return alert("URL を入力してください");

    const videoId = extractVideoId(urlBase);
    if (!videoId) return alert("正しい YouTube URL を入力してください");

    const totalSeconds = minute * 60 + second;

    const url = totalSeconds > 0
        ? `https://www.youtube.com/watch?v=${videoId}&t=${totalSeconds}`
        : `https://www.youtube.com/watch?v=${videoId}`;

    const title = await fetchTitle(url);
    const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    const item = { url, comment, title, thumb };
    saveItem(item);
    renderItem(item);

    document.getElementById("youtubeUrl").value = "";
    document.getElementById("comment").value = "";
    document.getElementById("minuteInput").value = "";
    document.getElementById("secondInput").value = "";
}

// 表示（管理者だけ削除ボタン）
function renderItem(item) {
    const list = document.getElementById("list");

    const div = document.createElement("div");
    div.className = "item";

    let deleteButtonHtml = "";
    if (IS_ADMIN) {
        deleteButtonHtml = `<button class="delete-btn">削除</button>`;
    }

    div.innerHTML = `
        <img class="thumb" src="${item.thumb}">
        <div class="info">
            <a href="${item.url}" target="_blank"><b>${item.title}</b></a>
            <p>${item.comment}</p>
        </div>
        ${deleteButtonHtml}
    `;

    if (IS_ADMIN) {
        div.querySelector(".delete-btn").onclick = () => {
            div.remove();
            deleteItem(item.url);
        };
    }

    list.appendChild(div);
}

// 保存
function saveItem(item) {
    const saved = JSON.parse(localStorage.getItem("youtubeItems") || "[]");
    saved.push(item);
    localStorage.setItem("youtubeItems", JSON.stringify(saved));
}

// 削除
function deleteItem(url) {
    let saved = JSON.parse(localStorage.getItem("youtubeItems") || "[]");
    saved = saved.filter(item => item.url !== url);
    localStorage.setItem("youtubeItems", JSON.stringify(saved));
}

// ページ読み込み時に実行
loadItems();
</script>

</body>
</html>
