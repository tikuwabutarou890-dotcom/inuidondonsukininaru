<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>戌亥のここ好き</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>


/* ▼ 全体の幅を1000pxに統一 */
.kokosuki-container,
.collab-container,
#list,
#collabList,
.input-row,
.input-area {
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
}

/* ▼ タイトル（1000pxに合わせて中央） */
.page-title {
    max-width: 1000px;
    margin: 0 auto 25px;
    font-size: 40px;
    font-weight: 900;
    text-align: center;
    letter-spacing: 2px;
    color: #FFD84C;
    text-shadow: 0 0 10px rgba(255,216,76,0.5);
}

/* ▼ 入力フォーム（1000pxに統一） */
.input-row {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto 10px;
    display: flex;
    gap: 8px;
}

.input-row input,
.input-row .btn {
    flex: 1;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    font-size: 15px;
    border-radius: 6px;
}

/* コメント欄を長く、追加ボタンを短く */
.input-row input#comment {
    flex: 4;
}

.input-row .btn {
    flex: 1;
    max-width: 120px;
}

/* ▼ 一覧（1000pxに統一） */
#list {
    max-width: 1000px;
    width: 100%;
    margin: 0 auto;
}

/* ====== ここすきカード（1000pxに統一） ====== */
.item {
    max-width: 1000px;
    width: 100%;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 18px; /* ← 横広くなったので少し余裕を追加 */
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    gap: 20px; /* ← 余白を広げてゆったり */
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
}

.item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.item * {
    color: #fff !important;
}

/* ▼ サムネ（1000pxに合わせて少し大きく） */
.kokosuki-thumb {
    width: 220px;
    height: 124px;
    object-fit: cover;
    border-radius: 8px;
}

/* ▼ テキスト（自然に折り返す） */
.info {
    flex: 1;
}

.info b {
    font-size: 22px;
    margin-bottom: 6px;
}

.info p {
    margin: 4px 0;
    opacity: 0.8;
}

/* ▼ 時間表示 */
.time-display {
    font-size: 14px;
    font-weight: bold;
    opacity: 0.9;
    margin-bottom: 4px;
}

/* ▼ 削除ボタン */
.btn-danger {
    border: 2px solid #ff4c4c;
    background: transparent;
    color: #ff4c4c;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn-danger:hover {
    background: #ff4c4c;
    color: #fff;
    box-shadow: 0 0 10px #ff4c4c;
}

#randomArea .item {
    margin-bottom: 30px;
}

#randomArea3 .item {
    margin-bottom: 25px;
}

/* ▼ フェードインアニメーション */
.fade-in {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeInUp 0.5s ease forwards;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

</head>

<body>

<div class="kokosuki-container">

    <div class="page-title">戌亥のここ好き</div>

    <p>
        戌亥とこの「ここ好き」を投稿できます。歌、声、仕草、配信の一瞬など、あなたが“心を掴まれた瞬間”を自由に共有してください。<br>
        YouTube URL とコメント、分秒を入れるとその位置から再生できます。切り抜きじゃないので歌枠からもOKです。<br>
    </p>

    <div class="input-row">
        <input id="youtubeUrl" type="text" placeholder="YouTube の URL を入力">
    </div>

    <div class="input-row">
        <input id="minuteInput" type="number" min="0" placeholder="分">
        <input id="secondInput" type="number" min="0" max="59" placeholder="秒">
    </div>

    <div class="input-row">
        <input id="comment" type="text" placeholder="コメントを入力">
        <button class="btn" onclick="addItem()">追加</button>
    </div>

    <p>
        <button class="btn" onclick="showRandom()">ランダム表示</button>
        ←迷ったらこれ！みんなが追加したここ好きが詰まってるからハズレがない。
    </p>

    <p>
        <div id="randomArea3"></div>
        <button class="btn" onclick="showRandom3()">3件ガチャ</button>
        ←ランダム表示の３連版
    </p>

    <h3 style="max-width:1000px;margin:20px auto 10px;">
        追加された一覧がこちら　カードをクリックするとそこから始まります。
    </h3>
    <div id="list"></div>

</div>

<script>
const IS_ADMIN = {{ 'true' if admin else 'false' }};

// YouTube ID 抽出
function extractVideoId(url) {
    const match = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return match ? match[1] : null;
}

// タイトル取得
async function fetchTitle(url) {
    try {
        const res = await fetch(`https://noembed.com/embed?url=${url}`);
        const data = await res.json();
        return data.title || "タイトル取得失敗";
    } catch {
        return "タイトル取得失敗";
    }
}

// ===============================
//  ここ好き 永続化：追加
// ===============================
async function addItem() {
    const urlBase = document.getElementById("youtubeUrl").value.trim();
    const comment = document.getElementById("comment").value.trim();
    const minute = parseInt(document.getElementById("minuteInput").value || 0);
    const second = parseInt(document.getElementById("secondInput").value || 0);

    if (!urlBase) return alert("URL を入力してください");

    const videoId = extractVideoId(urlBase);
    if (!videoId) return alert("正しい YouTube URL を入力してください");

    const totalSeconds = minute * 60 + second;

    const url = totalSeconds > 0
        ? `https://www.youtube.com/watch?v=${videoId}&t=${totalSeconds}`
        : `https://www.youtube.com/watch?v=${videoId}`;

    const title = await fetchTitle(url);
    const thumb = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    const item = { url, comment, title, minute, second, thumbnail: thumb };

    await fetch("/api/kokosuki/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(item)
    });

    loadItems();  // 再読み込み

    document.getElementById("youtubeUrl").value = "";
    document.getElementById("comment").value = "";
    document.getElementById("minuteInput").value = "";
    document.getElementById("secondInput").value = "";
}

// ===============================
//  一覧読み込み（DB → API）
// ===============================
async function loadItems() {
    const res = await fetch("/api/kokosuki/list");
    const items = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    items.forEach(item => renderItem(item));
}

// ===============================
//  カード描画
// ===============================
function renderItem(item) {
    const list = document.getElementById("list");

    const div = document.createElement("div");
    div.className = "item";

    const timeText = `${item.minute}:${String(item.second).padStart(2, '0')}`;

    div.innerHTML = `
        <img class="kokosuki-thumb" src="${item.thumbnail}">
        <div class="info">
            <div class="time-display">${timeText}</div>
            <b>${item.title}</b>
            <p>${item.comment}</p>
        </div>
        ${IS_ADMIN ? `<button class="btn-danger delete-btn">削除</button>` : ""}
    `;

    div.onclick = () => window.open(item.url, "_blank");

    if (IS_ADMIN) {
        const delBtn = div.querySelector(".delete-btn");
        delBtn.onclick = async (e) => {
            e.stopPropagation();
            await fetch("/api/kokosuki/delete", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: item.id})
            });
            loadItems();
        };
    }

    list.appendChild(div);
}

// ===============================
//  ランダム表示
// ===============================
async function showRandom() {
    const res = await fetch("/api/kokosuki/list");
    const items = await res.json();

    if (items.length === 0) return alert("まだ投稿がありません");

    const randomItem = items[Math.floor(Math.random() * items.length)];
    window.open(randomItem.url, "_blank");
}

// ===============================
//  3件ガチャ
// ===============================
async function showRandom3() {
    const res = await fetch("/api/kokosuki/list");
    const items = await res.json();

    if (items.length === 0) return alert("まだ投稿がありません");

    const shuffled = [...items].sort(() => Math.random() - 0.5);
    const picks = shuffled.slice(0, 3);

    const area = document.getElementById("randomArea3");
    area.innerHTML = "";

    picks.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item fade-in";
        div.style.animationDelay = `${index * 0.15}s`;

        const timeText = `${item.minute}:${String(item.second).padStart(2, '0')}`;

        div.innerHTML = `
            <img class="kokosuki-thumb" src="${item.thumbnail}">
            <div class="info">
                <div class="time-display">${timeText}</div>
                <b>${item.title}</b>
                <p>${item.comment}</p>
            </div>
        `;

        div.onclick = () => window.open(item.url, "_blank");

        area.appendChild(div);
    });
}

// 初期ロード
loadItems();
showRandom3();
</script>

</body>
</html>
